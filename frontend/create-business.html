<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Business Page</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --surface: #ffffff;
      --text: #14213d;
      --muted: #5f6b7a;
      --line: #dbe3ec;
      --accent: #2563eb;
      --danger: #c62828;
      --success: #0f9d58;
      --radius: 18px;
      --shadow: 0 14px 40px rgba(20, 33, 61, 0.08);
      --max: 920px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      width: min(100% - 32px, var(--max));
      margin: 40px auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    h1, h2, p { margin: 0; }

    h1 {
      margin-bottom: 10px;
      font-size: 2rem;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 26px;
    }

    .section {
      margin-top: 28px;
      padding-top: 22px;
      border-top: 1px solid var(--line);
    }

    .section:first-of-type {
      margin-top: 0;
      padding-top: 0;
      border-top: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.95rem;
      font-weight: 700;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 0.98rem;
      background: #fff;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .actions {
      margin-top: 26px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button, .back-link {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 0.98rem;
      cursor: pointer;
      text-decoration: none;
    }

    button {
      background: var(--accent);
      color: white;
      font-weight: 700;
    }

    .back-link {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .message {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      display: none;
      font-weight: 600;
    }

    .message.error {
      display: block;
      background: #fdecea;
      color: var(--danger);
      border: 1px solid #f5c2c0;
    }

    .message.success {
      display: block;
      background: #e9f7ef;
      color: var(--success);
      border: 1px solid #b7e1c1;
    }

    @media (max-width: 720px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Create Business Page</h1>
      <p class="sub">Register a business owner and publish the first version of the business page.</p>

      <form id="businessForm">
        <div class="section">
          <h2>Owner Information</h2>
          <div class="grid">
            <div class="field">
              <label for="owner_first_name">First Name</label>
              <input id="owner_first_name" name="owner_first_name" required />
            </div>

            <div class="field">
              <label for="owner_last_name">Last Name</label>
              <input id="owner_last_name" name="owner_last_name" required />
            </div>

            <div class="field">
              <label for="owner_email">Owner Email</label>
              <input id="owner_email" name="owner_email" type="email" required />
            </div>

            <div class="field">
              <label for="owner_password">Password</label>
              <input id="owner_password" name="owner_password" type="password" required />
            </div>

            <div class="field full">
              <label for="owner_phone">Owner Phone</label>
              <input id="owner_phone" name="owner_phone" />
            </div>
          </div>
        </div>

        <div class="section">
          <h2>Business Information</h2>
          <div class="grid">
            <div class="field">
              <label for="business_name">Business Name</label>
              <input id="business_name" name="business_name" required />
            </div>

            <div class="field">
              <label for="slug">Slug</label>
              <input id="slug" name="slug" required />
            </div>

            <div class="field">
              <label for="business_type">Business Type</label>
              <select id="business_type" name="business_type" required>
                <option value="">Select</option>
                <option value="store">Store</option>
                <option value="restaurant">Restaurant</option>
                <option value="service">Service</option>
                <option value="education">Education</option>
                <option value="clinic">Clinic</option>
                <option value="agency">Agency</option>
                <option value="other">Other</option>
              </select>
            </div>

       <div class="field">
              <label for="category_id">Category</label>
             <select id="category_id" name="category_id" required>
             <option value="">Loading categories...</option>
              </select>
       </div>

            <div class="field full">
              <label for="short_description">Short Description</label>
              <textarea id="short_description" name="short_description" required></textarea>
            </div>

            <div class="field">
              <label for="country">Country</label>
              <input id="country" name="country" value="Canada" required />
            </div>

            <div class="field">
              <label for="city">City</label>
              <input id="city" name="city" required />
            </div>

            <div class="field">
              <label for="business_email">Business Email</label>
              <input id="business_email" name="business_email" type="email" />
            </div>

            <div class="field">
              <label for="business_phone">Business Phone</label>
              <input id="business_phone" name="business_phone" />
            </div>
          </div>
        </div>

        <div class="actions">
          <button type="submit">Create Business Page</button>
          <a class="back-link" href="index.html">Back to Home</a>
        </div>
      </form>

      <div id="message" class="message"></div>
    </div>
  </div>

  <script>
  const form = document.getElementById("businessForm");
  const messageBox = document.getElementById("message");
  const businessNameInput = document.getElementById("business_name");
  const slugInput = document.getElementById("slug");

  const API_BASE = "https://diwanet.com";

  function makeSlug(text) {
    return text
      .toLowerCase()
      .trim()
      .replace(/[^a-z0-9\\s-]/g, "")
      .replace(/\\s+/g, "-")
      .replace(/-+/g, "-");
  }

  businessNameInput.addEventListener("input", () => {
    if (!slugInput.dataset.touched) {
      slugInput.value = makeSlug(businessNameInput.value);
    }
  });

  slugInput.addEventListener("input", () => {
    slugInput.dataset.touched = "true";
    slugInput.value = makeSlug(slugInput.value);
  });

  async function loadCategories() {
    const select = document.getElementById("category_id");

    try {
      const response = await fetch(`${API_BASE}/api/categories`);
      const result = await response.json();

      if (!response.ok || !result.success) {
        select.innerHTML = '<option value="">Could not load categories</option>';
        return;
      }

      select.innerHTML = '<option value="">Select</option>';

      result.categories.forEach((category) => {
        const option = document.createElement("option");
        option.value = category.id;
        option.textContent = category.name;
        select.appendChild(option);
      });
    } catch (error) {
      console.error(error);
      select.innerHTML = '<option value="">Server connection failed</option>';
    }
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    messageBox.className = "message";
    messageBox.textContent = "";

    const payload = {
      owner_first_name: document.getElementById("owner_first_name").value.trim(),
      owner_last_name: document.getElementById("owner_last_name").value.trim(),
      owner_email: document.getElementById("owner_email").value.trim(),
      owner_password: document.getElementById("owner_password").value.trim(),
      owner_phone: document.getElementById("owner_phone").value.trim(),
      business_name: document.getElementById("business_name").value.trim(),
      slug: document.getElementById("slug").value.trim(),
      business_type: document.getElementById("business_type").value,
      category_id: document.getElementById("category_id").value,
      short_description: document.getElementById("short_description").value.trim(),
      country: document.getElementById("country").value.trim(),
      city: document.getElementById("city").value.trim(),
      business_email: document.getElementById("business_email").value.trim(),
      business_phone: document.getElementById("business_phone").value.trim()
    };

    try {
      const response = await fetch(`${API_BASE}/api/business/register`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const text = await response.text();
      let result = {};

      try {
        result = JSON.parse(text);
      } catch (e) {
        result = { error: text };
      }

      if (!response.ok) {
        messageBox.className = "message error";
        messageBox.textContent = result.error || "Something went wrong.";
        return;
      }

          messageBox.className = "message success";
      messageBox.textContent = "Business page created successfully. Redirecting...";

      if (result.token) {
        localStorage.setItem("dn_token", result.token);
        localStorage.setItem("dn_user", JSON.stringify({ id: result.user_id, role: "business_owner" }));
        localStorage.setItem("dn_business", JSON.stringify({ id: result.business_id, slug: result.slug }));
      }

      setTimeout(() => {
        window.location.href = `business.html?slug=${result.slug}`;
      }, 900);
    } catch (error) {
      console.error(error);
      messageBox.className = "message error";
      messageBox.textContent = "Server connection failed: " + error.message;
    }
  });

  loadCategories();
</script>
</body>
</html>
